# INFO: Monitors
# https://wiki.hypr.land/Configuring/Monitors/

monitor = eDP-1, 1920x1200@60, 0x0, 1.25
monitor = desc:Dell Inc. DELL P2418D MY3ND0120JTT, 2560x1440@60, auto-right, 1.25
monitor = , preferred, auto, 1

# INFO: Autostart

exec-once = hyprpaper
exec-once = hypridle
exec-once = hyprsunset

exec-once = waybar
exec-once = swaync

exec-once = gsettings set org.gnome.desktop.interface gtk-theme "Adwaita"            # for GTK3 apps
exec-once = gsettings set org.gnome.desktop.interface color-scheme "prefer-light"    # for GTK4 apps

# INFO: Environment Variables
# https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE, 24
env = HYPRCURSOR_SIZE, 24

# INFO: Variables - General
# https://wiki.hypr.land/Configuring/Variables/#general

general {
    gaps_in = 5
    gaps_out = 5

    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# INFO: Variables - Decoration
# https://wiki.hypr.land/Configuring/Variables/#decoration

decoration {
    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# INFO: Variables - Animations
# https://wiki.hypr.land/Configuring/Variables/#animations

animations {
    enabled = yes
}

# INFO: Window Layout
# https://wiki.hypr.land/Configuring/Dwindle-Layout/

dwindle {
    preserve_split = true # You probably want this
}

# https://wiki.hypr.land/Configuring/Master-Layout/
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}


# INFO: Peripherals
# https://wiki.hypr.land/Configuring/Variables/#input

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }
}

# INFO: Gestures
# https://wiki.hypr.land/Configuring/Gestures

gesture = 3, horizontal, workspace

# INFO: Keybinds
# https://wiki.hypr.land/Configuring/Binds/

$mainMod = ALT

$browser = flatpak run com.brave.Browser
$spotify = flatpak run com.spotify.Client
$bitwarden = flatpak run com.bitwarden.desktop
$discord = flatpak run com.discordapp.Discord
$obsidian = flatpak run md.obsidian.Obsidian

bind = $mainMod, Q, killactive,
bind = $mainMod, V, togglefloating,
bind = $mainMod, F, fullscreen,
bind = $mainMod, BRACKETLEFT, movecurrentworkspacetomonitor, -1
bind = $mainMod, BRACKETRIGHT, movecurrentworkspacetomonitor, +1

# Keybinds for applications
bind = $mainMod, SPACE, exec, hyprlauncher
bind = $mainMod, RETURN, exec, kitty
bind = $mainMod, E, exec, nautilus
bind = SUPER, L, exec, hyprlock
bind = , PRINT, exec, grim -g "$(slurp -d)" - | wl-copy

# Dark Mode / Light Mode
bind = $mainMod, TAB, exec, hyprctl hyprsunset temperature 6000 && gsettings set org.gnome.desktop.interface gtk-theme "Adwaita"
bind = $mainMod SHIFT, TAB, exec, hyprctl hyprsunset temperature 1500 && gsettings set org.gnome.desktop.interface gtk-theme "Adwaita-dark"

bind = $mainMod, B, exec, $browser
bind = $mainMod, S, exec, $spotify
bind = $mainMod, D, exec, $discord
bind = $mainMod, W, exec, $browser https://web.whatsapp.com
bind = $mainMod, P, exec, $bitwarden
bind = $mainMod, N, exec, $obsidian
bind = $mainMod, O, exec, $browser https://outlook.office.com
bind = $mainMod, T, exec, teams-for-linux

# Move focus with mainMod + arrow keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
# bind = $mainMod, S, togglespecialworkspace, magic
# bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# INFO: Workspace Rules
# https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

workspace =  1, monitor:eDP-1, default:true
workspace =  2, monitor:eDP-1
workspace =  3, monitor:eDP-1
workspace =  4, monitor:eDP-1
workspace =  5, monitor:eDP-1
workspace =  6, monitor:desc:Dell Inc. DELL P2418D MY3ND0120JTT, default:true
workspace =  7, monitor:desc:Dell Inc. DELL P2418D MY3ND0120JTT
workspace =  8, monitor:desc:Dell Inc. DELL P2418D MY3ND0120JTT
workspace =  9, monitor:desc:Dell Inc. DELL P2418D MY3ND0120JTT
workspace = 10, monitor:desc:Dell Inc. DELL P2418D MY3ND0120JTT

# INFO: Windows Rules
# https://wiki.hypr.land/Configuring/Window-Rules/

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}

# Applicatin Workspace Rules
windowrule {
    name = spotify-workspace
    match:title = .*Spotify.*
    workspace = 2
}

windowrule {
    name = whatsapp-workspace
    match:title = .*Untitled.*
    workspace = 1
}

xwayland {
    force_zero_scaling = true
}
